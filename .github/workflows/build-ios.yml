name: Build iOS IPA

on:
  push:
    branches: [ ios-build-exports ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true # Downloads large Git LFS binary files (libiPhone-lib.a)

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Fix Line Endings and Executable Permissions
        run: |
          # Strip Windows carriage returns (\r) from exported scripts & binaries
          find iOSexports -type f \( -name "*.sh" -o -name "*.command" -o -name "*.py" -o -name "il2cpp*" -o -name "MapFileParser*" \) -exec sed -i '' $'s/\r$//' {} +

          # Grant full executable permissions across the iOSexports folder
          chmod -R +x iOSexports

      - name: Build GameAssembly Target First (Generates il2cpp.a)
        run: |
          xcodebuild -project iOSexports/Unity-iPhone.xcodeproj \
                     -target GameAssembly \
                     -configuration Release \
                     -sdk iphoneos

      - name: Build Xcode Archive (Unsigned)
        run: |
          xcodebuild archive \
            -project iOSexports/Unity-iPhone.xcodeproj \
            -scheme Unity-iPhone \
            -archivePath build/Unity-iPhone.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package into IPA
        run: |
          mkdir -p build/Payload
          cp -r build/Unity-iPhone.xcarchive/Products/Applications/Unity-iPhone.app build/Payload/
          cd build
          zip -r Unity-iPhone.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity-iPhone-IPA
          path: build/Unity-iPhone.ipa