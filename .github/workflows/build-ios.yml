name: Build iOS App

on:
  push:
    branches: [ ios-build-exports, main, master ]
  pull_request:
    branches: [ ios-build-exports, main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Select Xcode Version
      run: |
        sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
        xcodebuild -version

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Fix IL2CPP permissions and line endings
      run: |
        # Strip Windows CRLF line endings from all scripts and IL2CPP build tools
        find iOSexports -type f \( -name "*.sh" -o -name "*.command" -o -name "*.py" -o -name "il2cpp*" -o -name "MapFileParser*" \) -exec perl -pi -e 's/\r\n/\n/g' {} +
        
        # Grant executable permissions across the exported iOS directory
        chmod -R +x iOSexports

    - name: Build Xcode Archive (Unsigned)
      run: |
        xcodebuild archive \
          -project iOSexports/Unity-iPhone.xcodeproj \
          -scheme Unity-iPhone \
          -archivePath build/Unity-iPhone.xcarchive \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Package into IPA
      run: |
        mkdir -p build/Payload
        cp -r build/Unity-iPhone.xcarchive/Products/Applications/Unity-iPhone.app build/Payload/
        cd build
        zip -r Unity-iPhone.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unity-iPhone-IPA
        path: build/Unity-iPhone.ipa